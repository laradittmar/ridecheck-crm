<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Ridecheck CRM{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;display:grid;place-items:center;min-height:100vh;}
    .box{width:min(420px,94vw);background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px;box-shadow:0 8px 22px rgba(0,0,0,.08);}
    .title{font-size:22px;font-weight:700;color:#111827;margin:0 0 10px;}
    .muted{color:#6b7280;font-size:13px;margin:0 0 14px;}
    label{display:block;font-size:12px;color:#374151;margin:10px 0 5px;}
    input{width:100%;height:36px;border:1px solid #d1d5db;border-radius:8px;padding:0 10px;box-sizing:border-box;}
    .passwordWrap{position:relative;}
    .passwordWrap input{padding-right:40px;}
    .eyeBtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:#6b7280;cursor:pointer;padding:0;width:28px;height:28px;margin:0;display:grid;place-items:center;}
    .captchaBox{margin-top:10px;padding:8px 10px;border:1px solid #d1d5db;background:#f9fafb;border-radius:8px;font-size:13px;color:#111827;}
    button{margin-top:14px;width:100%;height:38px;border:none;border-radius:8px;background:#111827;color:#fff;font-weight:600;cursor:pointer;}
    .err{margin-top:10px;color:#b91c1c;font-size:13px;}
    .errorBox{margin-top:10px;padding:8px 10px;border:1px solid #fecaca;background:#fef2f2;color:#b91c1c;border-radius:8px;font-size:13px;}
    .links{margin-top:10px;font-size:13px;}
    .links p{margin:4px 0;}
  </style>
</head>
<body>
  <div class="box">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
