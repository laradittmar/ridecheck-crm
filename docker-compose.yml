services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://crm:crm@postgres:5432/crm
      WHATSAPP_TOKEN: "dummy"
      WHATSAPP_VERIFY_TOKEN: "ridecheck_whatsapp_verify_2026"
      WHATSAPP_PHONE_NUMBER_ID: "123"
      WHATSAPP_APP_SECRET: ""
      N8N_WEBHOOK_URL: "http://n8n:5678/webhook/ridecheck-inbound"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy


  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:



